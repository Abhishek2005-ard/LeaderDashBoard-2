version: '3.8'

services:
  # ==========================================
  # Database Service (Local MongoDB instance)
  # ==========================================
  db:
    image: mongo:6.0-jammy
    container_name: smart-leads-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-network

  # ==========================================
  # Backend API Microservice
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # By default connects to the containerised local db. Can be changed to MongoDB Atlas.
      - MONGODB_URI=mongodb://db:27017/leaderboard
      - JWT_SECRET=AntigravitySecretKey2026!
      - JWT_EXPIRES_IN=30d
    # Enable host bind-mounting for backend hot-reloading (ts-node-dev)
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    depends_on:
      - db
    networks:
      - smart-leads-network

  # ==========================================
  # Frontend Web Client Microservice
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    # Enable host bind-mounting for frontend hot module replacement (HMR)
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - smart-leads-network

# ==========================================
# Persistent Volumes & Networks
# ==========================================
volumes:
  mongo_data:
    driver: local

networks:
  smart-leads-network:
    driver: bridge
